name: Update Dashboard

on:
  push:
    paths:
      - 'data/FUSO_Advanced_Model_v2.xlsx'   # triggers ONLY when Excel changes
  workflow_dispatch:                           # manual trigger button in GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Build dashboard data from Excel
        run: python3 scripts/build.py

      - name: Verify JSON was generated
        run: |
          if [ ! -f data/dashboard_data.json ]; then
            echo "ERROR: dashboard_data.json not created"
            exit 1
          fi
          echo "JSON size: $(wc -c < data/dashboard_data.json) bytes"
          echo "SKU count: $(python3 -c "import json; d=json.load(open('data/dashboard_data.json')); print(d['meta']['total_skus'])")"

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard_data.json
          git diff --staged --quiet || git commit -m "chore: auto-rebuild dashboard data [skip ci]"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,scripts,*.py,*.xlsx'
